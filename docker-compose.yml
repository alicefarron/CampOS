version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campost}
      POSTGRES_DB: ${POSTGRES_DB:-campost}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campost}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  camp-service:
    build:
      context: .
      args:
        SERVICE: camp-service
        PORT: 3001
    restart: unless-stopped
    ports:
      - "${CAMP_SERVICE_PORT:-3001}:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-campost}:${POSTGRES_PASSWORD:-campost}@postgres:5432/campost
      KAFKA_BROKERS: kafka:9092
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  registration-service:
    build:
      context: .
      args:
        SERVICE: registration-service
        PORT: 3002
    restart: unless-stopped
    ports:
      - "${REGISTRATION_SERVICE_PORT:-3002}:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgres://${POSTGRES_USER:-campost}:${POSTGRES_PASSWORD:-campost}@postgres:5432/campost_registrations
      KAFKA_BROKERS: kafka:9092
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  news-service:
    build:
      context: .
      args:
        SERVICE: news-service
        PORT: 3003
    restart: unless-stopped
    ports:
      - "${NEWS_SERVICE_PORT:-3003}:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER:-campost}:${POSTGRES_PASSWORD:-campost}@postgres:5432/campost_news
      KAFKA_BROKERS: kafka:9092
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
        PORT: 3004
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3004}:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgres://${POSTGRES_USER:-campost}:${POSTGRES_PASSWORD:-campost}@postgres:5432/campost_notifications
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kafka_data:
